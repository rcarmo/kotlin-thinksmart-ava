name: Android

on:
  push:
    branches:
      - main
      - master
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Ava
    runs-on: ubuntu-latest
    env:
      AVA_RELEASE_KEYSTORE_BASE64: ${{ secrets.AVA_RELEASE_KEYSTORE_BASE64 }}
      AVA_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.AVA_RELEASE_KEYSTORE_PASSWORD }}
      AVA_RELEASE_KEY_ALIAS: ${{ secrets.AVA_RELEASE_KEY_ALIAS }}
      AVA_RELEASE_KEY_PASSWORD: ${{ secrets.AVA_RELEASE_KEY_PASSWORD }}
      AVA_RELEASE_KEYSTORE_TYPE: ${{ secrets.AVA_RELEASE_KEYSTORE_TYPE }}

    steps:
      - name: Check out sources
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install Android native toolchain
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(find "$ANDROID_HOME/cmdline-tools" -path '*/bin/sdkmanager' | sort -V | tail -n 1)"
          fi
          yes | "$SDKMANAGER" --licenses >/dev/null
          "$SDKMANAGER" --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "cmake;3.22.1" \
            "ndk;25.1.8937393"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Configure release signing
        if: env.AVA_RELEASE_KEYSTORE_BASE64 != ''
        run: |
          mkdir -p app/keystore
          echo "$AVA_RELEASE_KEYSTORE_BASE64" | base64 --decode > app/keystore/ava-release.p12
          {
            echo "storeFile=keystore/ava-release.p12"
            echo "storePassword=$AVA_RELEASE_KEYSTORE_PASSWORD"
            echo "keyAlias=$AVA_RELEASE_KEY_ALIAS"
            echo "keyPassword=$AVA_RELEASE_KEY_PASSWORD"
            echo "storeType=${AVA_RELEASE_KEYSTORE_TYPE:-pkcs12}"
          } > signing.properties

      - name: Run JVM tests
        run: ./gradlew --no-daemon test

      - name: Build release APK
        run: ./gradlew --no-daemon assembleRelease

      - name: Package APK artifact
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/*.apk dist/Ava-release.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v6
        with:
          name: Ava-release-apk
          path: dist/Ava-release.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          name: Ava ${{ github.ref_name }}
          files: dist/Ava-release.apk
          generate_release_notes: true
